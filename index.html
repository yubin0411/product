
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers">
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
        </div>
        <button id="generate">Generate Numbers</button>

        <hr class="divider">

        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/maqlewnd" method="POST" class="contact-form">
            <input type="text" name="name" placeholder="이름 / 회사명" required>
            <input type="email" name="email" placeholder="이메일" required>
            <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
    </div>

    <div class="container" id="disqus-section">
        <h2>댓글</h2>
        <div id="disqus_thread"></div>
    </div>

    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname;
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://yubin-test1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>댓글을 보려면 JavaScript를 활성화해주세요.</noscript>

    <script src="main.js"></script>
</body>
</html>
